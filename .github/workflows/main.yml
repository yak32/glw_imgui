name: status

on: [push, pull_request]

# NOTE: CI builds the glw_imgui library only (-DGLW_IMGUI_DEMO=OFF). The demo
# bundles 2019-era SDL2 + glew with cmake-2.8 sub-projects that no longer
# configure on current runners; modernizing the demo is tracked separately.

jobs:
  build_on_ubuntu:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v1
    - name: submodules
      run: git submodule update --init
    - name: configure
      run: mkdir build; cd build; cmake -DGLW_IMGUI_DEMO=OFF ..
    - name: build
      run: cd build; cmake --build . --target glw_imgui

  build_on_windows:

    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v1
    - name: submodules
      run: git submodule update --init
    - name: configure
      run: mkdir build; cd build; cmake -DGLW_IMGUI_DEMO=OFF ..
    - name: build
      run: cd build; cmake --build . --target glw_imgui

  build_on_macOS:

    runs-on: macOS-latest

    steps:
    - uses: actions/checkout@v1
    - name: submodules
      run: git submodule update --init
    - name: configure
      run: mkdir build; cd build; cmake -DGLW_IMGUI_DEMO=OFF ..
    - name: build
      run: cd build; cmake --build . --target glw_imgui
